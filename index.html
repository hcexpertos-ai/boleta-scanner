<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Boleta IA" />
  <link rel="apple-touch-icon" href="icon.png" />
  <link rel="icon" type="image/png" href="icon.png" />
  <title>Boleta IA</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f13;
      --card: #1a1a22;
      --accent: #6c63ff;
      --accent2: #48cfad;
      --text: #f0f0f5;
      --muted: #888;
      --danger: #ff6b6b;
      --success: #48cfad;
      --radius: 18px;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 0 40px;
    }

    /* ── LOGIN ── */
    #login-screen {
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }
    #login-screen .logo {
      font-size: 4rem;
      margin-bottom: 12px;
    }
    #login-screen h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 6px;
    }
    #login-screen p {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 40px;
    }
    .login-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 28px 24px;
      width: 100%;
      max-width: 380px;
    }
    .login-card label {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .login-card input {
      width: 100%;
      background: #111;
      border: 1px solid #333;
      border-radius: 10px;
      color: var(--text);
      font-size: 1rem;
      padding: 14px;
      margin-bottom: 16px;
    }
    .login-card input:focus { outline: none; border-color: var(--accent); }
    .btn-login {
      width: 100%;
      padding: 16px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 4px;
    }
    .btn-login:active { opacity: 0.85; }
    .btn-login:disabled { background: #333; color: #666; cursor: not-allowed; }
    #login-error {
      color: var(--danger);
      font-size: 0.85rem;
      text-align: center;
      margin-top: 14px;
      display: none;
    }
    #login-error.visible { display: block; }

    /* ── APP ── */
    #app-screen { display: none; width: 100%; }

    header {
      width: 100%;
      padding: 56px 24px 20px;
      text-align: center;
      background: linear-gradient(180deg, #1a1a2e 0%, transparent 100%);
      position: relative;
    }
    header h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.5px; }
    header p  { color: var(--muted); font-size: 0.85rem; margin-top: 4px; }

    .user-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #1a1a2e;
      border: 1px solid #333;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 10px;
      cursor: pointer;
    }
    .user-badge span { color: var(--accent2); font-weight: 600; }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      margin: 0 20px 16px;
      width: calc(100% - 40px);
    }

    .capture-area {
      border: 2px dashed #333;
      border-radius: 14px;
      min-height: 200px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      transition: border-color 0.2s;
      overflow: hidden;
    }
    .capture-area:active { border-color: var(--accent); }
    .capture-area img { width: 100%; max-height: 340px; object-fit: contain; border-radius: 10px; }
    .capture-icon { font-size: 3rem; opacity: 0.4; }
    .capture-label { color: var(--muted); font-size: 0.9rem; }

    .btn-row { display: flex; gap: 10px; margin-top: 14px; }

    button {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    button:active { opacity: 0.8; transform: scale(0.97); }
    .btn-primary   { background: var(--accent); color: #fff; }
    .btn-secondary { background: #2a2a38; color: var(--text); }
    .btn-send      { background: var(--accent2); color: #111; }
    .btn-send:disabled { background: #333; color: #666; cursor: not-allowed; }

    #status-card { display: none; }
    #status-card.visible { display: block; }

    .status-box {
      border-radius: 12px;
      padding: 16px;
      font-size: 0.9rem;
      line-height: 1.6;
    }
    .status-box.loading { background: #1a1a30; border: 1px solid var(--accent); }
    .status-box.success { background: #0d2b22; border: 1px solid var(--success); }
    .status-box.error   { background: #2b0d0d; border: 1px solid var(--danger); }

    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2px solid #444;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .result-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }
    .result-tile {
      background: #0f2b20;
      border-radius: 10px;
      padding: 12px;
      text-align: center;
    }
    .result-tile .val { font-size: 1.5rem; font-weight: 700; color: var(--success); }
    .result-tile .lbl { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }

    .product-list { margin-top: 14px; max-height: 220px; overflow-y: auto; }
    .product-item {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 8px 0;
      border-bottom: 1px solid #222;
      font-size: 0.85rem;
      gap: 8px;
    }
    .product-item:last-child { border-bottom: none; }
    .product-name { flex: 1; }
    .product-price { color: var(--accent2); font-weight: 600; white-space: nowrap; }
  </style>
</head>
<body>

<!-- ══════════════════════════════════════
     PANTALLA DE LOGIN
══════════════════════════════════════ -->
<div id="login-screen">
  <div class="logo">🧾</div>
  <h1>Boleta IA</h1>
  <p>Foto a Google Sheets automatico</p>

  <div class="login-card">
    <label>Usuario</label>
    <input type="text" id="login-user" placeholder="tu usuario" autocomplete="username" />
    <label>Contrasena</label>
    <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password" />
    <button class="btn-login" id="btn-login" onclick="doLogin()">Ingresar</button>
    <div id="login-error">Usuario o contrasena incorrectos</div>
  </div>
</div>

<!-- ══════════════════════════════════════
     PANTALLA PRINCIPAL (post-login)
══════════════════════════════════════ -->
<div id="app-screen">
  <header>
    <h1>Boleta IA</h1>
    <p>Foto a Google Sheets automatico</p>
    <div class="user-badge" onclick="doLogout()">
      Hola, <span id="user-display">—</span> &nbsp;· Salir
    </div>
  </header>

  <div class="card">
    <div class="capture-area" id="capture-area">
      <span class="capture-icon">📷</span>
      <span class="capture-label">Toca para elegir foto</span>
    </div>

    <!-- Un solo input sin capture= para que Android muestre galería + cámara -->
    <input type="file" id="input-file" accept="image/*" style="display:none" />
    <!-- Input con cámara directa -->
    <input type="file" id="input-camera" accept="image/*" capture="environment" style="display:none" />

    <div class="btn-row">
      <button class="btn-secondary" onclick="document.getElementById('input-file').click()">🖼️ Galeria</button>
      <button class="btn-secondary" onclick="document.getElementById('input-camera').click()">📷 Camara</button>
      <button class="btn-send" id="btn-send" disabled onclick="sendBoleta()">Procesar →</button>
    </div>
  </div>

  <div class="card" id="status-card">
    <div id="status-box"></div>
  </div>
</div>

<script>
  // ══════════════════════════════════════════════════════
  // CONFIGURACION — pon aqui la URL de tu script CENTRAL
  // ══════════════════════════════════════════════════════
  var CENTRAL_URL = 'PON_AQUI_LA_URL_DE_TU_SCRIPT_CENTRAL';

  var SESSION_KEY = 'boleta_session';

  // ── Sesion ────────────────────────────────────────────
  function getSession() {
    try { return JSON.parse(localStorage.getItem(SESSION_KEY)) || null; }
    catch(e) { return null; }
  }

  function saveSession(data) {
    localStorage.setItem(SESSION_KEY, JSON.stringify(data));
  }

  function clearSession() {
    localStorage.removeItem(SESSION_KEY);
  }

  // ── Login ─────────────────────────────────────────────
  async function doLogin() {
    var user = document.getElementById('login-user').value.trim();
    var pass = document.getElementById('login-pass').value.trim();
    var btn  = document.getElementById('btn-login');
    var err  = document.getElementById('login-error');

    if (!user || !pass) { err.textContent = 'Completa usuario y contrasena'; err.classList.add('visible'); return; }

    btn.disabled = true;
    btn.textContent = 'Verificando...';
    err.classList.remove('visible');

    try {
      var body = JSON.stringify({ action: 'login', usuario: user, password: pass });
      var resp = await fetch(CENTRAL_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: body,
        redirect: 'follow'
      });
      var data = await resp.json();

      if (data.success) {
        saveSession({ usuario: user, scriptUrl: data.script_url, sheetName: data.sheet_name || 'Boletas' });
        showApp(user);
      } else {
        err.textContent = data.error || 'Usuario o contrasena incorrectos';
        err.classList.add('visible');
      }
    } catch(e) {
      err.textContent = 'Error de red: ' + e.message;
      err.classList.add('visible');
    }

    btn.disabled = false;
    btn.textContent = 'Ingresar';
  }

  function doLogout() {
    if (!confirm('Cerrar sesion?')) return;
    clearSession();
    document.getElementById('app-screen').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('login-user').value = '';
    document.getElementById('login-pass').value = '';
  }

  function showApp(usuario) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'flex';
    document.getElementById('app-screen').style.flexDirection = 'column';
    document.getElementById('app-screen').style.alignItems = 'center';
    document.getElementById('user-display').textContent = usuario;
  }

  // ── Imagen ────────────────────────────────────────────
  var imageBase64 = null;
  var imageMediaType = 'image/jpeg';

  function handleFileChange(e) {
    var file = e.target.files[0];
    if (!file) return;
    imageMediaType = file.type || 'image/jpeg';
    var reader = new FileReader();
    reader.onload = function(ev) {
      var dataUrl = ev.target.result;
      imageBase64 = dataUrl.split(',')[1];
      var area = document.getElementById('capture-area');
      area.innerHTML = '<img src="' + dataUrl + '" alt="Boleta" />';
      document.getElementById('btn-send').disabled = false;
      setStatus('hidden');
    };
    reader.readAsDataURL(file);
  }

  document.getElementById('input-file').addEventListener('change', handleFileChange);
  document.getElementById('input-camera').addEventListener('change', handleFileChange);

  // click en el area de captura abre galeria
  document.getElementById('capture-area').addEventListener('click', function() {
    if (!document.querySelector('#capture-area img')) {
      document.getElementById('input-file').click();
    }
  });

  // ── Envio ─────────────────────────────────────────────
  async function sendBoleta() {
    var session = getSession();
    if (!session || !session.scriptUrl) { doLogout(); return; }
    if (!imageBase64) return;

    document.getElementById('btn-send').disabled = true;
    setStatus('loading', '<span class="spinner"></span> Analizando boleta con IA...');

    try {
      var body = JSON.stringify({
        image_base64: imageBase64,
        media_type: imageMediaType,
        sheet_name: session.sheetName
      });

      var resp = await fetch(session.scriptUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: body,
        redirect: 'follow'
      });

      var data = await resp.json();

      if (data.success) {
        setStatus('success', buildSuccessHtml(data));
        resetCapture();
      } else {
        setStatus('error', 'Error: ' + (data.error || 'Respuesta inesperada'));
        document.getElementById('btn-send').disabled = false;
      }
    } catch(e) {
      setStatus('error', 'Error de red: ' + e.message);
      document.getElementById('btn-send').disabled = false;
    }
  }

  function buildSuccessHtml(data) {
    var fmt = function(n) { return n != null ? '$' + Number(n).toLocaleString('es-CL') : '-'; };
    var html = '<div style="color:var(--success);font-weight:700;font-size:1rem;margin-bottom:12px">Guardado en Google Sheets</div>';
    html += '<div class="result-grid">';
    html += '<div class="result-tile"><div class="val">' + data.items_count + '</div><div class="lbl">Productos</div></div>';
    html += '<div class="result-tile"><div class="val">' + fmt(data.total_boleta) + '</div><div class="lbl">Total boleta</div></div>';
    html += '<div class="result-tile" style="grid-column:span 2"><div class="val" style="font-size:1rem">' + (data.comercio || '-') + '</div><div class="lbl">Comercio - ' + (data.fecha || '-') + '</div></div>';
    html += '</div>';
    if (data.items && data.items.length > 0) {
      html += '<div class="product-list">';
      data.items.forEach(function(item) {
        html += '<div class="product-item"><span class="product-name">' + item.nombre + '</span><span class="product-price">' + fmt(item.total_item) + '</span></div>';
      });
      html += '</div>';
    }
    return html;
  }

  function resetCapture() {
    imageBase64 = null;
    document.getElementById('input-file').value = '';
    document.getElementById('input-camera').value = '';
    document.getElementById('capture-area').innerHTML = '<span class="capture-icon">📷</span><span class="capture-label">Toca para tomar o elegir foto</span>';
    document.getElementById('btn-send').disabled = true;
  }

  function setStatus(type, html) {
    var card = document.getElementById('status-card');
    var box  = document.getElementById('status-box');
    if (type === 'hidden') { card.classList.remove('visible'); return; }
    card.classList.add('visible');
    box.className = 'status-box ' + type;
    box.innerHTML = html;
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  // ── Enter en login ────────────────────────────────────
  document.getElementById('login-pass').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
  });

  // ── Init: revisar sesion guardada ─────────────────────
  (function() {
    var session = getSession();
    if (session && session.usuario && session.scriptUrl) {
      showApp(session.usuario);
    }
  })();
</script>
</body>
</html>
